name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
      - '1.0'
      - '[0-9]*.[0-9]*.*'

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishing
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build binary wheel and source tarball
        run: python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # This action uses Trusted Publishing (OIDC) via the permissions above
          # No password/token is needed here!
          # You must configure PyPI as a Trusted Publisher for this Repo first.
          print-hash: true
